<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Authorized Video Downloader Options</title>
    <style>
      body { font: 14px/1.4 -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; margin: 24px; max-width: 760px; }
      h1 { margin-top: 0; }
      .row { margin-bottom: 16px; }
      pre { background: #f6f8fa; padding: 12px; border-radius: 8px; max-height: 320px; overflow: auto; }
      button { padding: 8px 12px; }
      label { display: block; margin: 8px 0; }
    </style>
  </head>
  <body>
    <h1>Authorized Video Downloader</h1>
    <div class="row">
      <label>Native host name <input id="hostName" /></label>
    </div>
    <div class="row">
      <label><input type="checkbox" id="youtube" /> Enable YouTube</label>
      <label><input type="checkbox" id="facebook" /> Enable Facebook</label>
    </div>
    <div class="row">
      <button id="save">Save</button>
      <button id="health">Health Check</button>
      <span id="status"></span>
    </div>
    <h2>Logs</h2>
    <pre id="logs"></pre>
    <script src="options.js"></script>
  </body>
</html>
